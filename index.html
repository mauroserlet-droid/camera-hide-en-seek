<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Real Global Serverless</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.95); padding: 30px; border-radius: 15px; border: 3px solid #ff4757; z-index: 10; width: 450px; box-sizing: border-box; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-hider { background-color: #2ed573; color: white; }
        .btn-seeker { background-color: #ff4757; color: white; }
        
        #gameScherm { position: relative; width: 800px; height: 600px; background-color: #222; margin: 20px auto; border: 6px solid #333; border-radius: 10px; overflow: hidden; display: none; }
        
        /* MULTIPLAYER CAMERARASTER */
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 5px; z-index: 1; background: #000; }
        .webcamBox { position: relative; width: 100%; height: 100%; background: #222; border: 1px solid #444; }
        .webcamStream { width: 100%; height: 100%; object-fit: cover; }
        .cameraLabel { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* Dynamische avatars */
        .avatar { position: absolute; width: 50px; height: 80px; z-index: 5; cursor: pointer; transform-origin: bottom center; }
        .avatarBody { width: 50px; height: 80px; background-color: #3498db; border-radius: 10px; position: relative; }
        .avatarBody::before { content: ''; position: absolute; top: -25px; left: 10px; width: 30px; height: 30px; background-color: #ffdbac; border-radius: 50%; }
        .avatar.is-seeker .avatarBody { background-color: #e74c3c; }
        .spelerNaam { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }

        #zoomControls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 8; display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; }
        .btn-zoom { background-color: #3498db; color: white; border: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; cursor: pointer;}
        #hud { background: rgba(0,0,0,0.8); padding: 10px; display: none; }
        
        textarea { width: 100%; height: 60px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; margin-top: 5px; resize: none; font-size: 10px; }
        .stap { background: rgba(255,255,255,0.05); padding: 10px; margin: 10px 0; border-radius: 8px; text-align: left; font-size: 13px; }
    </style>
</head>
<body>

    <!-- LOBBY MENU -->
    <div id="lobby">
        <h1>Webcam Hunt: Global Room</h1>
        <p>Spelersnaam: <input type="text" id="spelerNaamInput" value="Mauro" style="padding: 5px; border-radius: 5px; border: none; width: 100px; text-align: center;"></p>
        
        <div class="stap">
            <strong>Stap 1:</strong> Kies je rol om een uitnodiging te maken.
            <center>
                <!-- Onclick hersteld naar directe werking zonder JavaScript crashes -->
                <button class="btn btn-hider" onclick="startLobby('HIDER')">Word Hider</button>
                <button class="btn btn-seeker" onclick="startLobby('SEEKER')">Word Seeker</button>
            </center>
        </div>

        <div id="netwerkBlok" style="display:none;">
            <div class="stap">
                <strong>Stap 2:</strong> Stuur deze code naar je vriend(in):
                <textarea id="mijnCode" readonly onclick="this.select()"></textarea>
            </div>

            <div class="stap">
                <strong>Stap 3:</strong> Plak de code van je vriend(in) hieronder:
                <textarea id="anderCode" placeholder="Plak hier de code die je terugkrijgt..."></textarea>
                <center><button class="btn" style="background:#3498db; color:white; margin-top:5px;" onclick="verbindenKnop()">Verbind Spelers</button></center>
            </div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <h2>Rol: <span id="teamWeergave">-</span></h2>
        <p id="besturingInfo">Laden...</p>
    </div>

    <!-- SPEELVELD -->
    <div id="gameScherm">
        <div id="videoContainer"></div>
    </div>

    <div id="zoomControls">
        <button class="btn-zoom" onclick="zoomIn()">Dichterbij (+)</button>
        <button class="btn-zoom" onclick="zoomUit()">Verder Weg (-)</button>
    </div>

    <script>
        let mijnTeam = "";
        let mijnId = "User_" + Math.floor(Math.random() * 10000);
        let mijnNaam = "Mauro";
        
        let spelersData = {};
        let spelerX = 375; let spelerY = 250; let spelerSchaal = 1.0; 
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let lokaleStream = null;

        let localPeerConnection;
        let dataChannel;
        const rtcConfig = { iceServers: [{ urls: 'stun:://google.com' }] };

        async function startLobby(rol) {
            mijnTeam = rol;
            mijnNaam = document.getElementById('spelerNaamInput').value.trim() || "Mauro";
            
            // Maak het invoerblok voor de codes direct zichtbaar
            document.getElementById('netwerkBlok').style.display = "block";

            // Netwerkmotor direct initialiseren
            localPeerConnection = new RTCPeerConnection(rtcConfig);
            
            // Cameratoegang aanvragen (loopt asynchroon in de achtergrond zodat de knop NOOIT bevriest)
            navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then(stream => {
                lokaleStream = stream;
                voegVideoVakToe(mijnId, lokaleStream, mijnNaam + " (Jij)");
                lokaleStream.getTracks().forEach(track => localPeerConnection.addTrack(track, lokaleStream));
            })
            .catch(e => {
                console.log("Geen camera gevonden of geweigerd, spel start zonder video.");
            });

            dataChannel = localPeerConnection.createDataChannel("game-data");
            koppelKanaalEvents(dataChannel);

            localPeerConnection.ontrack = (event) => {
                voegVideoVakToe("Ander", event.streams[0], "Vriend(in)");
            };

            localPeerConnection.onicecandidate = (e) => {
                if (!e.candidate) {
                    const basisCode = { sdp: localPeerConnection.localDescription, name: mijnNaam, rol: mijnTeam };
                    document.getElementById('mijnCode').value = btoa(JSON.stringify(basisCode));
                }
            };

            const offer = await localPeerConnection.createOffer();
            await localPeerConnection.setLocalDescription(offer);
        }

        async function verbindenKnop() {
            const rawInput = document.getElementById('anderCode').value.trim();
            if(!rawInput) return alert("Plak eerst de code van je vriend(in)!");

            try {
                const gecrashteData = JSON.parse(atob(rawInput));
                
                if (gecrashteData.sdp.type === "offer") {
                    await localPeerConnection.setRemoteDescription(new RTCSessionDescription(gecrashteData.sdp));
                    const answer = await localPeerConnection.createAnswer();
                    await localPeerConnection.setLocalDescription(answer);
                    
                    const antwoordCode = { sdp: localPeerConnection.localDescription, name: mijnNaam, rol: mijnTeam };
                    document.getElementById('mijnCode').value = btoa(JSON.stringify(antwoordCode));
                    alert("Kopieer nu de NIEUWE code uit Stap 2 en stuur die terug naar je vriend(in)!");
                } else if (gecrashteData.sdp.type === "answer") {
                    await localPeerConnection.setRemoteDescription(new RTCSessionDescription(gecrashteData.sdp));
                }

                spelersData["Ander"] = { name: gecrashteData.name, x: 375, y: 250, schaal: 1.0, rol: gecrashteData.rol };
                maakAvatarElement("Ander", gecrashteData.rol, gecrashteData.name);
            } catch (err) {
                alert("Ongeldige code! Zorg dat je de volledige lap tekst kopieert.");
            }
        }

        function koppelKanaalEvents(channel) {
            channel.onopen = () => openHetSpel();
            channel.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === "beweging") {
                    if (spelersData["Ander"]) {
                        spelersData["Ander"].x = data.x;
                        spelersData["Ander"].y = data.y;
                        spelersData["Ander"].schaal = data.schaal;
                    }
                }
                if (data.type === "kill") {
                    alert("BOOM! Je bent gekilld!");
                    resetAvatar();
                }
            };
            
            localPeerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                koppelKanaalEvents(dataChannel);
            };
        }

        function openHetSpel() {
            document.getElementById('lobby').style.display = "none";
            document.getElementById('gameScherm').style.display = "block";
            document.getElementById('hud').style.display = "block";
