<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Ronde Gebaseerd</title>
    
    <!-- Betrouwbare, wereldwijde verbinding-engine (PieSocket) -->
    <script src="https://unpkg.com"></script>

    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.95); padding: 40px; border-radius: 15px; border: 3px solid #ff4757; z-index: 10; width: 400px; display: block; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; background-color: #ff4757; color: white; }
        
        #gameScherm { position: relative; width: 800px; height: 600px; background-color: #222; margin: 20px auto; border: 6px solid #333; border-radius: 10px; overflow: hidden; display: none; }
        
        /* MULTIPLAYER CAMERARASTER */
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 5px; z-index: 1; background: #000; }
        .webcamBox { position: relative; width: 100%; height: 100%; background: #222; border: 1px solid #444; }
        .webcamStream { width: 100%; height: 100%; object-fit: cover; }
        .cameraLabel { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* Dynamische avatars */
        .avatar { position: absolute; width: 50px; height: 80px; z-index: 5; cursor: pointer; transform-origin: bottom center; }
        .avatarBody { width: 50px; height: 80px; background-color: #3498db; border-radius: 10px; position: relative; }
        .avatarBody::before { content: ''; position: absolute; top: -25px; left: 10px; width: 30px; height: 30px; background-color: #ffdbac; border-radius: 50%; }
        
        /* Team Kleuren */
        .avatar.is-seeker .avatarBody { background-color: #e74c3c; } /* Zoeker = Rood */
        .avatar.is-helper .avatarBody { background-color: #e67e22; } /* Helper = Oranje */
        .avatar.is-hider .avatarBody { background-color: #2ed573; }  /* Verstopper = Groen */
        
        .spelerNaam { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }

        #zoomControls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 8; display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; }
        .btn-zoom { background-color: #3498db; color: white; border: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; cursor: pointer;}
        #hud { background: rgba(0,0,0,0.8); padding: 10px; display: none; position: relative; z-index: 9; }
        .input-veld { padding: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; width: 80%; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- LOBBY MENU -->
    <div id="lobby">
        <h1>Webcam Hunt</h1>
        
        <p>Jouw spelersnaam:</p>
        <input type="text" id="spelerNaamInput" class="input-veld" value="Mauro">
        
        <p>Kamernaam (deel met vrienden):</p>
        <input type="text" id="kamerNaamInput" class="input-veld" value="Kamer1">
        
        <br><br>
        <!-- GECORRIGEERD: Spatie uit functienaam gehaald! -->
        <button class="btn" onclick="drukOpStartKnop()">START GAME</button>
        <p id="wachtStatus" style="font-size: 13px; color: #2ed573; margin-top: 10px;"></p>
    </div>

    <!-- HUD -->
    <div id="hud">
        <h2>Rol: <span id="teamWeergave">Wachten op groep...</span> | Tijd over: <span id="timerWeergave">60</span>s</h2>
        <p id="besturingInfo">Rondes starten zodra iedereen op Start heeft gedrukt.</p>
    </div>

    <!-- SPEELVELD -->
    <div id="gameScherm">
        <div id="videoContainer"></div>
    </div>

    <div id="zoomControls">
        <button class="btn-zoom" onclick="zoomIn()">Dichterbij (+)</button>
        <button class="btn-zoom" onclick="zoomUit()">Verder Weg (-)</button>
    </div>

    <script>
        let mijnTeam = "PENDING"; 
        let mijnId = "User_" + Math.floor(Math.random() * 10000);
        let mijnNaam = "Mauro";
        let gekozenKamer = "Kamer1";
        
        let spelersData = {};
        let spelerX = 375; let spelerY = 250; let spelerSchaal = 1.0; 
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let lokaleStream = null;
        let pieSocket;
        
        let gameTimer;
        let tijdOver = 60;
        let spelleiderId = ""; 
        let alleSpelersKlaar = [];

        function drukOpStartKnop() {
            mijnNaam = document.getElementById('spelerNaamInput').value.trim() || "Mauro";
            gekozenKamer = document.getElementById('kamerNaamInput').value.trim() || "Kamer1";
            
            document.getElementById('wachtStatus').innerText = "Verbonden! Wachten op de rest van de groep...";
            
            // Initialiseer de wereldwijde netwerkmotor via PieSocket (Gratis demo-cluster)
            pieSocket = new PieSocket({
                clusterId: "demo",
                apiKey: "oCd62WoeYcoW9d7ACSTrSMSkW0OtNuI2j3p989rn" 
            });

            // Open een beveiligd kanaal gebaseerd op de unieke kamernaam
            gameChannel = pieSocket.subscribe(`webcam-hunt-${gekozenKamer}`);

            gameChannel.on("open", () => {
                // Laat de wereld direct weten dat jij in de lobby zit te wachten
                stuurNetwerkBericht({ type: "ready", id: mijnId, name: mijnNaam });
                if (!alleSpelersKlaar.includes(mijnId)) alleSpelersKlaar.push(mijnId);
                checkStartVoorwaarden();
            });

            gameChannel.on("message", (msg) => {
                const data = JSON.parse(msg.data);
                if (data.id === mijnId) return;

                if (data.type === "ready") {
                    if (!alleSpelersKlaar.includes(data.id)) {
                        alleSpelersKlaar.push(data.id);
                        stuurNetwerkBericht({ type: "ready_sync", id: mijnId, name: mijnNaam });
                    }
                    checkStartVoorwaarden();
                }

                if (data.type === "ready_sync") {
                    if (!alleSpelersKlaar.includes(data.id)) alleSpelersKlaar.push(data.id);
                    checkStartVoorwaarden();
                }

                if (data.type === "start_ronde") {
                    startRondeEigenschappen(data.seekerId, data.hidersId);
                }

                if (data.type === "beweging") {
                    if (spelersData[data.id]) {
                        spelersData[data.id].x = data.x;
                        spelersData[data.id].y = data.y;
                        spelersData[data.id].schaal = data.schaal;
                    }
                }

                if (data.type === "tag") {
                    if (data.target === mijnId) {
                        mijnTeam = "HELPER";
                        document.getElementById('teamWeergave').innerText = "HELPER (HULPZOEKER)";
                        document.getElementById('teamWeergave').style.color = "#e67e22";
                        document.getElementById('besturingInfo').innerText = "Je bent gepakt! Help de zoeker om de rest te vinden!";
                        stuurPositie();
                    }
                    if (spelersData[data.target]) {
                        spelersData[data.target].rol = "HELPER";
                        updateAvatarKleur(data.target, "HELPER");
                    }
                    checkWinVoorwaarden();
                }

                if (data.type === "timer_sync") {
                    tijdOver = data.tijd;
                    document.getElementById('timerWeergave').innerText = tijdOver;
                    if (tijdOver <= 0) beëindigRonde("HIDERS_WIN");
                }
            });
        }

        function checkStartVoorwaarden() {
            alleSpelersKlaar.sort();
            spelleiderId = alleSpelersKlaar[0];

            // Als er minstens 2 computers in de lobby zitten, deelt de spelleider automatisch rollen uit
            if (alleSpelersKlaar.length >= 2 && mijnId === spelleiderId) {
                let randomIndex = Math.floor(Math.random() * alleSpelersKlaar.length);
                let gekozenSeeker = alleSpelersKlaar[randomIndex];
                let gekozenHiders = alleSpelersKlaar.filter(id => id !== gekozenSeeker);

                stuurNetwerkBericht({
                    type: "start_ronde",
                    seekerId: gekozenSeeker,
                    hidersId: gekozenHiders
                });
            }
        }

        function startRondeEigenschappen(seekerId, hidersId) {
            clearInterval(gameTimer);
            document.getElementById('lobby').style.display = "none";
            document.getElementById('gameScherm').style.display = "block";
            document.getElementById('hud').style.display = "block";
            
            document.getElementById('videoContainer').innerHTML = "";
            const oudeAvatars = document.querySelectorAll('.avatar');
            oudeAvatars.forEach(av => av.remove());
            spelersData = {};
            tijdOver = 60;
            spelerX = 375; spelerY = 250; spelerSchaal = 1.0;

            if (mijnId === seekerId) {
                mijnTeam = "SEEKER";
