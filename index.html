<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Global Link Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 40px; border-radius: 15px; border: 3px solid #ff4757; width: 400px; box-sizing: border-box; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 15px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background-color: #ff4757; color: white; width: 100%; }
        .input-veld { padding: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #333; color: white; }
        #deellink-sectie { display: none; margin-top: 20px; background: rgba(46, 213, 115, 0.1); padding: 15px; border-radius: 8px; border: 1px solid #2ed573; }
        textarea { width: 100%; height: 80px; background: #111; color: #2ed573; border: 1px solid #444; border-radius: 5px; font-family: monospace; font-size: 11px; resize: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Webcam Hunt 🚀</h1>
        <p>Verzin een unieke kamernaam om je game-link te programmeren:</p>
        <input type="text" id="kamernaam" class="input-veld" value="MauroKamer">
        
        <button class="btn" onclick="genereerGeprogrammeerdeLink()">GENEREER SPEL-LINK</button>

        <div id="deellink-sectie">
            <strong style="color: #2ed573;">✓ Je game is geprogrammeerd!</strong>
            <p style="font-size: 13px; margin: 5px 0;">Kopieer en deel deze link met je vrienden om direct wereldwijd te spelen:</p>
            <textarea id="outputLink" readonly onclick="this.select()"></textarea>
            <p style="font-size: 11px; color: #aaa;">(Tip: Plak deze link in een nieuw tabblad om het zelf te testen!)</p>
        </div>
    </div>

    <!-- We laden hier het losse script bestand veilig in (Nooit meer HTML parse-fouten!) -->
    <script src="gamecode.js"></script>
</body>
</html>
