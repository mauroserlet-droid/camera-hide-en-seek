<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Global QR & Link Room</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; overflow: hidden; }
        #lobby { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(20, 20, 20, 0.95); padding: 40px; border-radius: 15px; border: 3px solid #ff4757; z-index: 10; width: 420px; box-sizing: border-box; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: inline-block; }
        .btn-hider { background-color: #2ed573; color: white; }
        .btn-seeker { background-color: #ff4757; color: white; }
        
        #gameScherm { position: relative; width: 800px; height: 600px; background-color: #222; margin: 20px auto; border: 6px solid #333; border-radius: 10px; overflow: hidden; display: none; }
        
        /* MULTIPLAYER CAMERARASTER: Verdeelt het scherm voor alle spelers ter wereld */
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 5px; z-index: 1; background: #000; }
        .webcamBox { position: relative; width: 100%; height: 100%; background: #222; border: 1px solid #444; }
        .webcamStream { width: 100%; height: 100%; object-fit: cover; }
        .cameraLabel { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

        /* Dynamische avatars */
        .avatar { position: absolute; width: 50px; height: 80px; z-index: 5; cursor: pointer; transform-origin: bottom center; }
        .avatarBody { width: 50px; height: 80px; background-color: #3498db; border-radius: 10px; position: relative; }
        .avatarBody::before { content: ''; position: absolute; top: -25px; left: 10px; width: 30px; height: 30px; background-color: #ffdbac; border-radius: 50%; }
        .avatar.is-seeker .avatarBody { background-color: #e74c3c; }
        .spelerNaam { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }

        #zoomControls { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 8; display: none; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; }
        .btn-zoom { background-color: #3498db; color: white; border: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; cursor: pointer;}
        #hud { background: rgba(0,0,0,0.8); padding: 10px; display: none; }
        
        .link-box { background: rgba(255,255,255,0.05); padding: 12px; margin-top: 15px; border-radius: 8px; font-size: 13px; }
        #deellink { width: 100%; padding: 8px; background: #333; color: #2ed573; border: 1px solid #555; border-radius: 5px; text-align: center; font-family: monospace; font-size: 11px; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- LOBBY MENU -->
    <div id="lobby">
        <h1>Webcam Hunt</h1>
        <p>Spelersnaam: <input type="text" id="spelerNaamInput" value="Mauro" style="padding: 5px; border-radius: 5px; border: none; width: 120px; text-align: center;"></p>
        
        <p><strong>Stap 1:</strong> Kies je rol om het spel direct te starten.</p>
        <button class="btn btn-hider" onclick="startSpelOmgeving('HIDER')">Word Hider</button>
        <button class="btn btn-seeker" onclick="startSpelOmgeving('SEEKER')">Word Seeker</button>

        <div class="link-box">
            <strong>Stap 2:</strong> Deel deze link met vrienden op andere computers:
            <input type="text" id="deellink" readonly onclick="this.select()">
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <h2>Rol: <span id="teamWeergave">-</span></h2>
        <p id="besturingInfo">Laden...</p>
    </div>

    <!-- SPEELVELD -->
    <div id="gameScherm">
        <div id="videoContainer"></div>
    </div>

    <div id="zoomControls">
        <button class="btn-zoom" onclick="zoomIn()">Dichterbij (+)</button>
        <button class="btn-zoom" onclick="zoomUit()">Verder Weg (-)</button>
    </div>

    <script>
        let mijnTeam = "";
        let mijnId = "User_" + Math.floor(Math.random() * 10000);
        let mijnNaam = "Mauro";
        let kamerId = "";
        
        let spelersData = {};
        let spelerX = 375; let spelerY = 250; let spelerSchaal = 1.0; 
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        let lokaleStream = null;

        // Dit is de 100% betrouwbare netwerkmotor die we synchroniseren met localStorage
        window.addEventListener('DOMContentLoaded', () => {
            // Controleer of er al een kamer in de URL-balk staat, zo niet: maak er een aan
            const urlParams = new URLSearchParams(window.location.search);
            kamerId = urlParams.get('room');
            
            if (!kamerId) {
                kamerId = Math.floor(1000 + Math.random() * 9000);
                window.history.pushState({}, '', '?room=' + kamerId);
            }
            
            // Toon de kant-en-klare link direct in de lobby
            document.getElementById('deellink').value = window.location.href;

            // Luister continu naar de database-spiegeling (localStorage sync)
            window.addEventListener('storage', (e) => {
                if (e.key === `webcam_hunt_room_${kamerId}`) {
                    const data = JSON.parse(e.newValue);
                    if (!data || data.sender === mijnId) return;

                    if (data.type === "join") {
                        spelersData[data.sender] = { name: data.name, x: data.x, y: data.y, schaal: data.schaal, rol: data.rol };
                        maakAvatarElement(data.sender, data.rol, data.name);
                        
                        // Stuur direct jouw positie terug
                        stuurNetwerkData({
                            type: "sync", name: mijnNaam, rol: mijnTeam, x: spelerX, y: spelerY, schaal: spelerSchaal
                        });
                    }

                    if (data.type === "sync") {
                        if (!spelersData[data.sender]) {
                            spelersData[data.sender] = { name: data.name, x: data.x, y: data.y, schaal: data.schaal, rol: data.rol };
                            maakAvatarElement(data.sender, data.rol, data.name);
                        }
                    }

                    if (data.type === "beweging") {
                        if (spelersData[data.sender]) {
                            spelersData[data.sender].x = data.x;
                            spelersData[data.sender].y = data.y;
                            spelersData[data.sender].schaal = data.schaal;
                        }
                    }

                    if (data.type === "kill" && data.target === mijnId) {
                        alert("BOOM! Je bent gekilld!");
                        resetAvatar();
                    }
                }
            });
        });

        function startSpelOmgeving(rol) {
            mijnTeam = rol;
            mijnNaam = document.getElementById('spelerNaamInput').value.trim() || "Mauro";
            
            // WISSEL SCHERM DIRECT (Kan nooit weigeren)
            document.getElementById('lobby').style.display = "none";
            document.getElementById('gameScherm').style.display = "block";
            document.getElementById('hud').style.display = "block";
            document.getElementById('teamWeergave').innerText = mijnTeam;

            maakAvatarElement(mijnId, mijnTeam, mijnNaam + " (Jij)");

            if (mijnTeam === 'HIDER') {
                document.getElementById('teamWeergave').style.color = "#2ed573";
                document.getElementById('zoomControls').style.display = "block";
                document.getElementById('besturingInfo').innerText = "Gebruik de pijltjestoetsen om te lopen.";
            } else {
                document.getElementById('teamWeergave').style.color = "#ff4757";
                document.getElementById('besturingInfo').innerText = "Klik op de Hider avatar om te killen!";
            }

            // Start camera veilig op de achtergrond
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                .then(stream => {
                    lokaleStream = stream;
                    voegVideoToe(mijnId, lokaleStream, mijnNaam + " (Jij)");
                }).catch(e => console.log("Camera overgeslagen. Spel start door."));
            }

            // Meld je aan bij het netwerk
            stuurNetwerkData({
                type: "join", name: mijnNaam, rol: mijnTeam, x: spelerX, y: spelerY, schaal: spelerSchaal
            });

            window.addEventListener('keydown', (e) => { if (e.key in keys) { e.preventDefault(); keys[e.key] = true; } });
            window.addEventListener('keyup', (e) => { if (e.key in keys) { keys[e.key] = false; } });

            setInterval(gameLoop, 1000 / 60);
        }

        function stuurNetwerkData(packet) {
            packet.sender = mijnId;
            packet.time = Date.now(); // Dwingt de browser om het netwerkpakket te verwerken
            localStorage.setItem(`webcam_hunt_room_${kamerId}`, JSON.stringify(packet));
        }

        function maakAvatarElement(id, rol, naam) {
            if (document.getElementById(`avatar-${id}`)) return;

            const av = document.createElement('div');
            av.id = `avatar-${id}`;
