<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Global Link Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 40px; border-radius: 15px; border: 3px solid #ff4757; width: 400px; box-sizing: border-box; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 15px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background-color: #ff4757; color: white; width: 100%; }
        .input-veld { padding: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #333; color: white; }
        #deellink-sectie { display: none; margin-top: 20px; background: rgba(46, 213, 115, 0.1); padding: 15px; border-radius: 8px; border: 1px solid #2ed573; }
        textarea { width: 100%; height: 80px; background: #111; color: #2ed573; border: 1px solid #444; border-radius: 5px; font-family: monospace; font-size: 11px; resize: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Webcam Hunt 🚀</h1>
        <p>Verzin een unieke kamernaam:</p>
        <input type="text" id="kamernaam" class="input-veld" value="MauroKamer">
        
        <!-- Directe onclick actie die direct reageert zonder te wachten op de browser -->
        <button class="btn" onclick="genereerDeSpellink()">GENEREER SPEL-LINK</button>

        <div id="deellink-sectie">
            <strong style="color: #2ed573;">✓ Je game is geprogrammeerd!</strong>
            <p style="font-size: 13px; margin: 5px 0;">Kopieer en deel deze link met je vrienden om direct wereldwijd te spelen:</p>
            <textarea id="outputLink" readonly onclick="this.select()"></textarea>
            <p style="font-size: 11px; color: #aaa;">(Tip: Plak deze link in een nieuw tabblad om het zelf te testen!)</p>
        </div>
    </div>

    <script>
        function genereerDeSpellink() {
            const kamer = document.getElementById('kamernaam').value.trim() || "MauroKamer";
            
            // We bouwen de HTML van het spel op via losse, simpele tekstregels
            let HTMLRegels = [];
            HTMLRegels.push('<!DOCTYPE html>');
            HTMLRegels.push('<html lang="nl">');
            HTMLRegels.push('<head>');
            HTMLRegels.push('<meta charset="UTF-8">');
            HTMLRegels.push('<title>Webcam Hunt - Live Game</title>');
            HTMLRegels.push('<style>');
            HTMLRegels.push('body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; overflow: hidden; }');
            HTMLRegels.push('#speelveld { position: relative; width: 800px; height: 600px; background-color: #222; margin: 20px auto; border: 6px solid #333; border-radius: 10px; overflow: hidden; }');
            HTMLRegels.push('#videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 5px; z-index: 1; background: #000; }');
            HTMLRegels.push('.webcamBox { position: relative; width: 100%; height: 100%; background: #222; border: 1px solid #444; }');
            HTMLRegels.push('.webcamStream { width: 100%; height: 100%; object-fit: cover; }');
            HTMLRegels.push('.cameraLabel { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }');
            HTMLRegels.push('.avatar { position: absolute; width: 50px; height: 80px; z-index: 5; cursor: pointer; transform-origin: bottom center; }');
            HTMLRegels.push('.avatarBody { width: 50px; height: 80px; background-color: #3498db; border-radius: 10px; position: relative; }');
            HTMLRegels.push('.avatarBody::before { content: ""; position: absolute; top: -25px; left: 10px; width: 30px; height: 30px; background-color: #ffdbac; border-radius: 50%; }');
            HTMLRegels.push('.avatar.is-seeker .avatarBody { background-color: #e74c3c; }');
            HTMLRegels.push('.avatar.is-helper .avatarBody { background-color: #e67e22; }');
            HTMLRegels.push('.avatar.is-hider .avatarBody { background-color: #2ed573; }');
            HTMLRegels.push('.spelerNaam { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }');
            HTMLRegels.push('#hud { background: rgba(0,0,0,0.8); padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 3px solid #ff4757; }');
            HTMLRegels.push('.btn-ready { padding: 10px 20px; font-size: 16px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }');
            HTMLRegels.push('</style>');
            HTMLRegels.push('</head>');
            HTMLRegels.push('<body>');
            
            HTMLRegels.push('<div id="hud">Kamer: ' + kamer + ' | <span id="statusTekst">Klik op de knop om klaar te staan!</span><br>');
            HTMLRegels.push('<button id="readyKnop" class="btn-ready" onclick="ikBenKlaar()">IK BEN KLAAR (START)</button></div>');
            HTMLRegels.push('<div id="speelveld"><div id="videoContainer"></div></div>');
            
            // We voegen het script toe zonder dat de browser denkt dat de hoofd-tag sluit
            HTMLRegels.push('<' + 'script' + '>');
            HTMLRegels.push('let mijnId = "User_" + Math.floor(Math.random() * 10000);');
            HTMLRegels.push('let mijnTeam = "PENDING";');
            HTMLRegels.push('let spelersData = {};');
            HTMLRegels.push('let spelerX = 375, spelerY = 250, spelerSchaal = 1.0;');
            HTMLRegels.push('let alleKlaar = [];');
            HTMLRegels.push('let lokaleStream = null;');
            HTMLRegels.push('let countdown = 60;');
            HTMLRegels.push('let timerLoop = null;');
            HTMLRegels.push('const kanaal = new BroadcastChannel("bc_room_" + "' + kamer + '");');
            
            HTMLRegels.push('kanaal.onmessage = (e) => {');
            HTMLRegels.push('  const d = e.data;');
            HTMLRegels.push('  if (!d || d.sender === mijnId) return;');
            HTMLRegels.push('  if (d.type === "ready") {');
            HTMLRegels.push('    if (!alleKlaar.includes(d.sender)) {');
            HTMLRegels.push('      alleKlaar.push(d.sender);');
            HTMLRegels.push('      kanaal.postMessage({ type: "ready_sync", sender: mijnId });');
            HTMLRegels.push('    }');
            HTMLRegels.push('    updateLobbyStatus();');
            HTMLRegels.push('  }');
            HTMLRegels.push('  if (d.type === "ready_sync") {');
            HTMLRegels.push('    if (!alleKlaar.includes(d.sender)) alleKlaar.push(d.sender);');
            HTMLRegels.push('    updateLobbyStatus();');
            HTMLRegels.push('  }');
            HTMLRegels.push('  if (d.type === "start") {');
            HTMLRegels.push('    startDeRonde(d.seeker, d.hiders);');
            HTMLRegels.push('  }');
            HTMLRegels.push('  if (d.type === "loop") {');
            HTMLRegels.push('    if (spelersData[d.sender]) {');
            HTMLRegels.push('      spelersData[d.sender].x = d.x; spelersData[d.sender].y = d.y; spelersData[d.sender].schaal = d.schaal;');
            HTMLRegels.push('    }');
            HTMLRegels.push('  }');
            HTMLRegels.push('  if (d.type === "tag") {');
            HTMLRegels.push('    if (d.target === mijnId) {');
            HTMLRegels.push('      mijnTeam = "HELPER";');
            HTMLRegels.push('      document.getElementById("statusTekst").innerText = "Je bent AF! Help de zoeker!";');
            HTMLRegels.push('    }');
            HTMLRegels.push('    if (spelersData[d.target]) spelersData[d.target].rol = "HELPER";');
            HTMLRegels.push('    document.getElementById("avatar-" + d.target).className = "avatar is-helper";');
            HTMLRegels.push('    checkWinnaar();');
            HTMLRegels.push('  }');
            HTMLRegels.push('  if (d.type === "timer") {');
            HTMLRegels.push('    countdown = d.tijd;');
            HTMLRegels.push('    document.getElementById("statusTekst").innerText = "Tijd over: " + countdown + "s | Rol: " + mijnTeam;');
            HTMLRegels.push('    if (countdown <= 0) stopSpel("HIDERS");');
            HTMLRegels.push('  }');
            HTMLRegels.push('};');

            HTMLRegels.push('function ikBenKlaar() {');
            HTMLRegels.push('  document.getElementById("readyKnop").style.display = "none";');
            HTMLRegels.push('  if (!alleKlaar.includes(mijnId)) alleKlaar.push(mijnId);');
            HTMLRegels.push('  kanaal.postMessage({ type: "ready", sender: mijnId });');
            HTMLRegels.push('  updateLobbyStatus();');
            HTMLRegels.push('}');

            HTMLRegels.push('function updateLobbyStatus() {');
            HTMLRegels.push('  if (mijnTeam !== "PENDING") return;');
            HTMLRegels.push('  document.getElementById("statusTekst").innerText = "Wachten... (" + alleKlaar.length + " spelers klaar)";');
            HTMLRegels.push('  alleKlaar.sort();');
            HTMLRegels.push('  if (alleKlaar.length >= 2 && mijnId === alleKlaar[0]) {');
            HTMLRegels.push('    setTimeout(() => {');
            HTMLRegels.push('      let s = alleKlaar[Math.floor(Math.random() * alleKlaar.length)];');
            HTMLRegels.push('      let h = alleKlaar.filter(id => id !== s);');
