    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #ff4757;
            z-index: 10;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-hider { background-color: #2ed573; color: white; }
        .btn-seeker { background-color: #ff4757; color: white; }
        
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            text-align: center;
            margin: 10px 0;
        }

        #gameScherm {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #222; 
            margin: 20px auto;
            border: 6px solid #333;
            border-radius: 10px;
            overflow: hidden;
            display: none; 
        }

        #remoteVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #avatarContainer {
            position: absolute;
            width: 50px;
            height: 80px;
            top: 250px;
            left: 375px;
            z-index: 5;
            cursor: pointer;
            transform-origin: bottom center;
        }
        #avatarBody {
            width: 50px;
            height: 80px;
            background-color: #3498db; 
            border-radius: 10px;
            position: relative;
        }
        #avatarBody::before {
            content: '';
            position: absolute;
            top: -25px;
            left: 10px;
            width: 30px;
            height: 30px;
            background-color: #ffdbac; 
            border-radius: 50%;
        }

        #zoomControls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 8;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 10px;
        }
        .btn-zoom { background-color: #3498db; color: white; border: none; padding: 10px 20px; margin: 0 5px; border-radius: 5px; cursor: pointer;}
        #hud { background: rgba(0,0,0,0.8); padding: 10px; display: none; }
        .code-box { font-size: 24px; color: #2ed573; font-weight: bold; background: #000; padding: 5px; border-radius: 5px; margin: 10px 0; }
    </style>
</head>
<body>

    <!-- LOBBY MENU -->
    <div id="lobby">
        <h1>Webcam Hunt: Built-in Edition</h1>
        <p>Wil jij je verstoppen of gaan zoeken?</p>
        
        <div style="border-bottom: 1px solid #444; padding-bottom: 20px; margin-bottom: 20px;">
            <button class="btn btn-hider" onclick="startAlsHider()">1. Word Hider</button>
            <div id="hiderCodeSectie" style="display:none;">
                <p>Geef deze code aan de Seeker:</p>
                <div id="mijnKamerCode" class="code-box">Laden...</div>
            </div>
        </div>

        <div>
            <p>Ben jij de Seeker? Typ de code van de Hider in:</p>
            <input type="text" id="kamercodeInput" placeholder="Code hier..."><br>
            <button class="btn btn-seeker" onclick="startAlsSeeker()">2. Connect & Hunt</button>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <h2>Rol: <span id="teamWeergave">-</span></h2>
        <p id="besturingInfo">Laden...</p>
    </div>

    <!-- HET SPEELVELD -->
    <div id="gameScherm">
        <video id="remoteVideo" autoplay playsinline muted></video>
        <div id="avatarContainer" onclick="killAvatar(event)">
            <div id="avatarBody"></div>
        </div>
    </div>

    <div id="zoomControls">
        <button class="btn-zoom" onclick="zoomIn()">Dichterbij (+)</button>
