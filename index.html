<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Hunt - Global Link Generator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; }
        .box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a1a; padding: 40px; border-radius: 15px; border: 3px solid #ff4757; width: 400px; box-sizing: border-box; }
        .btn { padding: 12px 24px; font-size: 16px; margin: 15px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background-color: #ff4757; color: white; width: 100%; }
        .input-veld { padding: 10px; border-radius: 5px; border: none; font-size: 16px; text-align: center; width: 100%; box-sizing: border-box; margin-bottom: 10px; background: #333; color: white; }
        #deellink-sectie { display: none; margin-top: 20px; background: rgba(46, 213, 115, 0.1); padding: 15px; border-radius: 8px; border: 1px solid #2ed573; }
        textarea { width: 100%; height: 80px; background: #111; color: #2ed573; border: 1px solid #444; border-radius: 5px; font-family: monospace; font-size: 11px; resize: none; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="box">
        <h1>Webcam Hunt 🚀</h1>
        <p>Verzin een unieke kamernaam om je game-link te programmeren:</p>
        <input type="text" id="kamernaam" class="input-veld" value="MauroKamer">
        
        <button class="btn" id="knopGenereer">GENEREER SPEL-LINK</button>

        <div id="deellink-sectie">
            <strong style="color: #2ed573;">✓ Je game is geprogrammeerd!</strong>
            <p style="font-size: 13px; margin: 5px 0;">Kopieer en deel deze link met je vrienden om direct wereldwijd te spelen:</p>
            <textarea id="outputLink" readonly onclick="this.select()"></textarea>
            <p style="font-size: 11px; color: #aaa;">(Tip: Plak deze link in een nieuw tabblad om het zelf te testen!)</p>
        </div>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('knopGenereer').addEventListener('click', () => {
                genereerGeprogrammeerdeLink();
            });
        });

        function genereerGeprogrammeerdeLink() {
            const kamer = document.getElementById('kamernaam').value.trim() || "MauroKamer";
            
            // We splitsen alle HTML tags op zodat de browser geen breuken of syntax-crashes kan veroorzaken
            const sOpen = '<' + 'script' + '>';
            const sSluit = '<' + '/' + 'script' + '>';

            let gameCode = '<!DOCTYPE html>\n<html lang="nl">\n<head>\n<meta charset="UTF-8">\n<title>Webcam Hunt - Live Game</title>\n';
            gameCode += '<style>\n';
            gameCode += 'body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; padding: 0; text-align: center; overflow: hidden; }\n';
            gameCode += '#speelveld { position: relative; width: 800px; height: 600px; background-color: #222; margin: 20px auto; border: 6px solid #333; border-radius: 10px; overflow: hidden; }\n';
            gameCode += '#videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 5px; z-index: 1; background: #000; }\n';
            gameCode += '.webcamBox { position: relative; width: 100%; height: 100%; background: #222; border: 1px solid #444; }\n';
            gameCode += '.webcamStream { width: 100%; height: 100%; object-fit: cover; }\n';
            gameCode += '.cameraLabel { position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); padding: 2px 8px; border-radius: 4px; font-size: 12px; }\n';
            gameCode += '.avatar { position: absolute; width: 50px; height: 80px; z-index: 5; cursor: pointer; transform-origin: bottom center; }\n';
            gameCode += '.avatarBody { width: 50px; height: 80px; background-color: #3498db; border-radius: 10px; position: relative; }\n';
            gameCode += '.avatarBody::before { content: ""; position: absolute; top: -25px; left: 10px; width: 30px; height: 30px; background-color: #ffdbac; border-radius: 50%; }\n';
            gameCode += '.avatar.is-seeker .avatarBody { background-color: #e74c3c; }\n';
            gameCode += '.avatar.is-helper .avatarBody { background-color: #e67e22; }\n';
            gameCode += '.avatar.is-hider .avatarBody { background-color: #2ed573; }\n';
            gameCode += '.spelerNaam { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 11px; white-space: nowrap; }\n';
            gameCode += '#hud { background: rgba(0,0,0,0.8); padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 3px solid #ff4757; }\n';
            gameCode += '.btn-ready { padding: 10px 20px; font-size: 16px; background: #ff4757; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }\n';
            gameCode += '</style>\n</head>\n<body>\n';
            
            // We bouwen de HTML interface van het spel op met de gekozen kamernaam
            gameCode += '<div id="hud">Kamer: ' + kamer + ' | <span id="statusTekst">Klik op de knop om klaar te staan!</span><br>';
            gameCode += '<button id="readyKnop" class="btn-ready" onclick="ikBenKlaar()">IK BEN KLAAR (START)</button></div>\n';
            gameCode += '<div id="speelveld"><div id="videoContainer"></div></div>\n';
            
            // Voeg de interne JavaScript-netwerkmotor toe zonder runtime errors
            gameCode += sOpen + '\n';
            gameCode += 'let mijnId = "User_" + Math.floor(Math.random() * 10000);\n';
            gameCode += 'let mijnTeam = "PENDING";\n';
            gameCode += 'let spelersData = {};\n';
            gameCode += 'let spelerX = 375, spelerY = 250, spelerSchaal = 1.0;\n';
            gameCode += 'let alleKlaar = [];\n';
            gameCode += 'let lokaleStream = null;\n';
            gameCode += 'let countdown = 60;\n';
            gameCode += 'let timerLoop = null;\n';
            gameCode += 'const kanaal = new BroadcastChannel("bc_room_" + "' + kamer + '");\n';
            
            gameCode += 'kanaal.onmessage = (e) => {\n';
            gameCode += '  const d = e.data;\n';
            gameCode += '  if (!d || d.sender === mijnId) return;\n';
            gameCode += '  if (d.type === "ready") {\n';
            gameCode += '    if (!alleKlaar.includes(d.sender)) {\n';
            gameCode += '      alleKlaar.push(d.sender);\n';
            gameCode += '      kanaal.postMessage({ type: "ready_sync", sender: mijnId });\n';
            gameCode += '    }\n';
            gameCode += '    updateLobbyStatus();\n';
            gameCode += '  }\n';
            gameCode += '  if (d.type === "ready_sync") {\n';
            gameCode += '    if (!alleKlaar.includes(d.sender)) alleKlaar.push(d.sender);\n';
            gameCode += '    updateLobbyStatus();\n';
            gameCode += '  }\n';
            gameCode += '  if (d.type === "start") {\n';
            gameCode += '    startDeRonde(d.seeker, d.hiders);\n';
            gameCode += '  }\n';
            gameCode += '  if (d.type === "loop") {\n';
            gameCode += '    if (spelersData[d.sender]) {\n';
            gameCode += '      spelersData[d.sender].x = d.x; spelersData[d.sender].y = d.y; spelersData[d.sender].schaal = d.schaal;\n';
            gameCode += '    }\n';
            gameCode += '  }\n';
            gameCode += '  if (d.type === "tag") {\n';
            gameCode += '    if (d.target === mijnId) {\n';
            gameCode += '      mijnTeam = "HELPER";\n';
            gameCode += '      document.getElementById("statusTekst").innerText = "Je bent AF! Help de zoeker!";\n';
            gameCode += '    }\n';
            gameCode += '    if (spelersData[d.target]) spelersData[d.target].rol = "HELPER";\n';
            gameCode += '    document.getElementById("avatar-" + d.target).className = "avatar is-helper";\n';
            gameCode += '    checkWinnaar();\n';
            gameCode += '  }\n';
            gameCode += '  if (d.type === "timer") {\n';
            gameCode += '    countdown = d.tijd;\n';
            gameCode += '    document.getElementById("statusTekst").innerText = "Tijd over: " + countdown + "s | Rol: " + mijnTeam;\n';
            gameCode += '    if (countdown <= 0) stopSpel("HIDERS");\n';
            gameCode += '  }\n';
            gameCode += '};\n';

            gameCode += 'function ikBenKlaar() {\n';
            gameCode += '  document.getElementById("readyKnop").style.display = "none";\n';
            gameCode += '  if (!alleKlaar.includes(mijnId)) alleKlaar.push(mijnId);\n';
            gameCode += '  kanaal.postMessage({ type: "ready", sender: mijnId });\n';
            gameCode += '  updateLobbyStatus();\n';
            gameCode += '}\n';

            gameCode += 'function updateLobbyStatus() {\n';
            gameCode += '  if (mijnTeam !== "PENDING") return;\n';
            gameCode += '  document.getElementById("statusTekst").innerText = "Wachten op groep... (" + alleKlaar.length + " spelers klaar)";\n';
            gameCode += '  alleKlaar.sort();\n';
            gameCode += '  if (alleKlaar.length >= 2 && mijnId === alleKlaar[0]) {\n';
            gameCode += '    setTimeout(() => {\n';
            gameCode += '      let s = alleKlaar[Math.floor(Math.random() * alleKlaar.length)];\n';
            gameCode += '      let h = alleKlaar.filter(id => id !== s);\n';
            gameCode += '      kanaal.postMessage({ type: "start", seeker: s, hiders: h });\n';
            gameCode += '      startDeRonde(s, h);\n';
